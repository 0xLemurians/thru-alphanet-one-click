name: ShellCheck

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          check_together: 'yes'
          severity: warning
        env:
          SHELLCHECK_OPTS: -x -e SC1091 -e SC2034 -e SC2016
